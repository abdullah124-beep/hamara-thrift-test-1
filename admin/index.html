<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Hamara Thrift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="login-page">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">HT</div>
        <div>
          <div class="login-brand-name">Hamara Thrift</div>
          <div class="login-brand-sub">Admin Panel</div>
        </div>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-desc">Sign in to manage your store</p>

      <div id="login-error" class="login-error hidden">
        <i class="bi bi-exclamation-circle"></i> Invalid username or password
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <i class="bi bi-person input-icon"></i>
          <input type="text" id="login-user" class="form-input" placeholder="admin" autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" id="login-pass" class="form-input" placeholder="••••••••" autocomplete="current-password">
          <button class="toggle-pass" type="button" id="toggle-pass" aria-label="Show password">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btn-login">
        <span>Sign In</span>
        <i class="bi bi-arrow-right"></i>
      </button>

      <p class="login-hint">Default credentials: <code>admin</code> / <code>admin123</code><br>
        <small>Change these before going live in <code>admin.js</code></small></p>
    </div>
  </div>

  <script src="assets/js/admin.js"></script>
  <script>
    // Login logic
    document.getElementById('btn-login').addEventListener('click', handleLogin);
    document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    document.getElementById('toggle-pass').addEventListener('click', function() {
      const inp = document.getElementById('login-pass');
      const icon = this.querySelector('i');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'bi bi-eye'; }
    });

    function handleLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;
      const err  = document.getElementById('login-error');
      const btn  = document.getElementById('btn-login');

      if (user === ADMIN_CREDENTIALS.username && pass === ADMIN_CREDENTIALS.password) {
        btn.innerHTML = '<i class="bi bi-check"></i> Redirecting...';
        btn.style.background = '#16a34a';
        sessionStorage.setItem('ht_admin_auth', '1');
        setTimeout(() => window.location.href = 'dashboard.html', 600);
      } else {
        err.classList.remove('hidden');
        document.getElementById('login-pass').value = '';
        document.getElementById('login-pass').focus();
        setTimeout(() => err.classList.add('hidden'), 3000);
      }
    }

    // Redirect if already logged in
    if (sessionStorage.getItem('ht_admin_auth') === '1') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
