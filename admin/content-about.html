<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Page Content — Hamara Thrift Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">HT</div>
      <div><div class="sidebar-brand-name">Hamara Thrift</div><div class="sidebar-brand-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <div class="nav-item" data-page="dashboard.html"><i class="bi bi-grid-1x2"></i> Dashboard</div>
      <div class="nav-item" data-page="products.html"><i class="bi bi-box-seam"></i> Products</div>
      <div class="nav-item" data-page="orders.html"><i class="bi bi-bag-check"></i> Orders</div>
      <div class="nav-section-label">Content</div>
      <div class="nav-item" data-page="content-home.html"><i class="bi bi-house"></i> Home Page</div>
      <div class="nav-item" data-page="content-about.html"><i class="bi bi-person-lines-fill"></i> About Page</div>
      <div class="nav-item" data-page="content-contact.html"><i class="bi bi-telephone"></i> Contact Page</div>
      <div class="nav-item" data-page="content-shop.html"><i class="bi bi-bag"></i> Shop Page</div>
      <div class="nav-item" data-page="content-settings.html"><i class="bi bi-gear"></i> Settings</div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-avatar">A</div>
      <div><div class="sidebar-user-name">Abdullah</div><div class="sidebar-user-role">Owner</div></div>
      <button class="sidebar-logout" title="Sign out"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </aside>
  <div class="sidebar-overlay"></div>

  <div class="main-content">
    <div class="topbar">
      <button class="topbar-toggle"><i class="bi bi-list"></i></button>
      <span class="topbar-title">About Page Content</span>
      <div class="topbar-right">
        <a href="../about.html" target="_blank" class="topbar-store-link"><i class="bi bi-arrow-up-right-square"></i> Preview</a>
      </div>
    </div>
    <div class="page-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1>About Page Content</h1>
          <p>Edit your story, founder info, and mission statement.</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline" id="btn-reset-about">Reset to Default</button>
          <button class="btn btn-primary" id="btn-save-about"><i class="bi bi-check-lg"></i> Save Changes</button>
        </div>
      </div>

      <div class="content-sections">

        <!-- HERO -->
        <div class="section-block">
          <div class="section-block-header" onclick="toggleSection(this)">
            <div class="section-block-title"><i class="bi bi-type-h1" style="color:var(--primary)"></i> About Hero</div>
            <i class="bi bi-chevron-down toggle-chevron"></i>
          </div>
          <div class="section-block-body">
            <div class="field-row field-row-2">
              <div class="field-group">
                <label class="field-label">Heading Line 1</label>
                <input type="text" class="field-input" id="a-hero-h1" placeholder="We Love Sneakers.">
              </div>
              <div class="field-group">
                <label class="field-label">Heading Line 2</label>
                <input type="text" class="field-input" id="a-hero-h2" placeholder="We Hate Waste.">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Hero Subtitle</label>
              <textarea class="field-textarea" id="a-hero-sub" rows="2"></textarea>
            </div>
          </div>
        </div>

        <!-- STORY -->
        <div class="section-block">
          <div class="section-block-header" onclick="toggleSection(this)">
            <div class="section-block-title"><i class="bi bi-book" style="color:#7c3aed"></i> Our Story</div>
            <i class="bi bi-chevron-down toggle-chevron"></i>
          </div>
          <div class="section-block-body">
            <div class="field-group">
              <label class="field-label">Story Heading</label>
              <input type="text" class="field-input" id="a-story-h" placeholder="How it Started">
            </div>
            <div class="field-group">
              <label class="field-label">Story Body</label>
              <textarea class="field-textarea" id="a-story-body" rows="4"></textarea>
            </div>
          </div>
        </div>

        <!-- FOUNDER -->
        <div class="section-block">
          <div class="section-block-header" onclick="toggleSection(this)">
            <div class="section-block-title"><i class="bi bi-person-circle" style="color:var(--accent)"></i> Founder Info</div>
            <i class="bi bi-chevron-down toggle-chevron"></i>
          </div>
          <div class="section-block-body">
            <div class="field-row field-row-2">
              <div class="field-group">
                <label class="field-label">Founder Name</label>
                <input type="text" class="field-input" id="a-founder-name" placeholder="Abdullah Arshad">
              </div>
              <div class="field-group">
                <label class="field-label">Founder Title</label>
                <input type="text" class="field-input" id="a-founder-title" placeholder="Founder & Sole Curator">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Location</label>
              <input type="text" class="field-input" id="a-founder-location" placeholder="Wapda Town, Multan">
            </div>
            <div class="field-group">
              <label class="field-label">Founder Bio</label>
              <textarea class="field-textarea" id="a-founder-bio" rows="3"></textarea>
            </div>
          </div>
        </div>

        <!-- MISSION -->
        <div class="section-block">
          <div class="section-block-header" onclick="toggleSection(this)">
            <div class="section-block-title"><i class="bi bi-bullseye" style="color:var(--danger)"></i> Mission Statement</div>
            <i class="bi bi-chevron-down toggle-chevron"></i>
          </div>
          <div class="section-block-body">
            <div class="field-group">
              <label class="field-label">Mission Heading</label>
              <input type="text" class="field-input" id="a-mission-h" placeholder="Our Mission">
            </div>
            <div class="field-group">
              <label class="field-label">Mission Body</label>
              <textarea class="field-textarea" id="a-mission-body" rows="3"></textarea>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast-stack"></div>
<script src="assets/js/admin.js"></script>
<script>
  requireAuth();
  initSidebar('content-about.html');

  function toggleSection(header) {
    const body = header.nextElementSibling;
    const chevron = header.querySelector('.toggle-chevron');
    const isOpen = !body.classList.contains('hidden');
    body.classList.toggle('hidden', isOpen);
    chevron.style.transform = isOpen ? 'rotate(-90deg)' : 'rotate(0deg)';
  }

  const FIELDS = {
    'a-hero-h1':       ['about','heroHeading'],
    'a-hero-h2':       ['about','heroSubheading'],
    'a-hero-sub':      ['about','heroSubtitle'],
    'a-story-h':       ['about','storyHeading'],
    'a-story-body':    ['about','storyBody'],
    'a-founder-name':  ['about','founderName'],
    'a-founder-title': ['about','founderTitle'],
    'a-founder-location':['about','founderLocation'],
    'a-founder-bio':   ['about','founderBio'],
    'a-mission-h':     ['about','missionHeading'],
    'a-mission-body':  ['about','missionBody'],
  };

  function getNestedVal(obj, keys) {
    return keys.reduce((o, k) => (o && o[k] !== undefined ? o[k] : ''), obj);
  }
  function setNestedVal(obj, keys, val) {
    const last = keys[keys.length - 1];
    const parent = keys.slice(0, -1).reduce((o, k) => { if (!o[k]) o[k]={}; return o[k]; }, obj);
    parent[last] = val;
  }

  function loadFields() {
    const content = Store.getContent();
    Object.entries(FIELDS).forEach(([id, path]) => {
      const el = document.getElementById(id);
      if (el) el.value = getNestedVal(content, path);
    });
  }

  document.getElementById('btn-save-about').addEventListener('click', () => {
    const content = Store.getContent();
    Object.entries(FIELDS).forEach(([id, path]) => {
      const el = document.getElementById(id);
      if (el) setNestedVal(content, path, el.value.trim());
    });
    Store.saveContent(content);
    AdminToast.show('About page content saved!', 'success');
  });

  document.getElementById('btn-reset-about').addEventListener('click', () => {
    if (!confirm('Reset about page content to default?')) return;
    const content = Store.getContent();
    content.about = Store._defaultContent().about;
    Store.saveContent(content);
    loadFields();
    AdminToast.show('Reset to default.', 'success');
  });

  loadFields();
</script>
</body>
</html>
